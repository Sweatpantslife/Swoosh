<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <radialGradient id="ab-body" cx="0.33" cy="0.25" r="0.95">
      <stop offset="0" stop-color="#ffe08a"/>
      <stop offset="0.38" stop-color="#ffc933"/>
      <stop offset="0.66" stop-color="#ffb300"/>
      <stop offset="0.88" stop-color="#ff8f00"/>
      <stop offset="1" stop-color="#c96a00"/>
    </radialGradient>
    <linearGradient id="ab-rim" x1="20" y1="12" x2="110" y2="118" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffe98a"/>
      <stop offset="0.5" stop-color="#ffd54a"/>
      <stop offset="1" stop-color="#c9971c"/>
    </linearGradient>
    <linearGradient id="ab-spec" x1="0" y1="0" x2="0.35" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="ab-clip">
      <path d="M64 5 C91 32 91 96 64 123 C37 96 37 32 64 5 Z"/>
    </clipPath>
    <filter id="ab-blur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>
  <!-- marquise cut: pointed eye-shaped ellipse with long facets running tip to tip -->
  <path d="M64 5 C91 32 91 96 64 123 C37 96 37 32 64 5 Z" fill="url(#ab-body)"/>
  <g clip-path="url(#ab-clip)">
    <ellipse cx="80" cy="96" rx="38" ry="34" fill="#a35400" opacity="0.5" filter="url(#ab-blur)"/>
    <ellipse cx="48" cy="32" rx="28" ry="26" fill="#fff0b8" opacity="0.5" filter="url(#ab-blur)"/>
    <path d="M64 5 C91 32 91 96 64 123 C37 96 37 32 64 5 Z" fill="none" stroke="#ffe08a" stroke-width="6" opacity="0.5" filter="url(#ab-blur)" transform="translate(64 64) scale(0.9) translate(-64 -64)"/>
    <!-- long crown facets from tips and girdle to the table -->
    <g stroke="#8f5400" stroke-opacity="0.3" stroke-width="1.6">
      <path d="M64 5 L54 44 M64 5 L74 44 M64 123 L54 84 M64 123 L74 84 M44 64 L53.5 64 M84 64 L74.5 64"/>
    </g>
    <g stroke="#ffffff" stroke-opacity="0.22" stroke-width="1.4">
      <path d="M64 5 L64 32 M64 123 L64 96 M54 44 L44 64 L54 84 M74 44 L84 64 L74 84"/>
    </g>
    <!-- elongated table lozenge -->
    <path d="M64 32 C72 42 74.5 52 74.5 64 C74.5 76 72 86 64 96 C56 86 53.5 76 53.5 64 C53.5 52 56 42 64 32 Z" fill="#ffffff" opacity="0.1" stroke="#ffffff" stroke-opacity="0.3" stroke-width="1.6"/>
    <!-- lit and shaded facets -->
    <path d="M64 5 L54 44 L64 32 Z" fill="#ffffff" opacity="0.16"/>
    <path d="M64 123 L74 84 L64 96 Z" fill="#7a4700" opacity="0.16"/>
    <ellipse cx="53" cy="36" rx="11" ry="8" transform="rotate(-52 53 36)" fill="url(#ab-spec)"/>
    <circle cx="61" cy="22" r="3" fill="#ffffff" opacity="0.92"/>
  </g>
  <path d="M64 5 C91 32 91 96 64 123 C37 96 37 32 64 5 Z" fill="none" stroke="url(#ab-rim)" stroke-width="3" stroke-linejoin="round"/>
</svg>
